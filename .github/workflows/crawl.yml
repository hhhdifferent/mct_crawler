name: 文旅部时政要闻爬虫

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: '最大爬取页数（0=全部）'
        required: false
        default: '3'

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 创建数据目录
        run: mkdir -p data

      - name: 运行爬虫
        env:
          MAX_PAGES: ${{ github.event.inputs.max_pages || '3' }}
          OUTPUT_DIR: data
        run: python mct_crawler.py

      - name: 上传数据（Artifact）
        uses: actions/upload-artifact@v6          # 只需改这里
        with:
          name: mct-news-${{ github.run_id }}
          path: data/*.csv
          retention-days: 90
