name: 通用定时爬虫（全站）
on:
  schedule:
    - cron: '0 2 * * *'        # 北京时间每天10:00（UTC 2:00）
  workflow_dispatch:            # 也支持手动触发

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.scan.outputs.configs }}
    steps:
      - uses: actions/checkout@v4
      - name: 扫描所有 config.json
        id: scan
        run: |
          # 找到所有包含 config.json 的子目录 + 根目录下的 config json
          configs=$(find . -maxdepth 2 -name "*.json" \
            -not -path "./.git/*" \
            -not -path "./.github/*" \
            -not -name "package.json" \
            -not -name "tsconfig.json" \
            | sed 's|^\./||' | jq -R -s -c 'split("\n") | map(select(length>0))')
          echo "configs=$configs" >> "$GITHUB_OUTPUT"
          echo "发现配置文件: $configs"

  crawl:
    needs: discover
    if: needs.discover.outputs.configs != '[]' && needs.discover.outputs.configs != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # 某个站点失败不影响其他站点
      matrix:
        config: ${{ fromJson(needs.discover.outputs.configs) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests lxml

      - name: 运行爬虫 - ${{ matrix.config }}
        run: python crawler.py "${{ matrix.config }}"

      - name: 上传结果到 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ replace(replace(matrix.config, '/', '-'), '.json', '') }}-${{ github.run_id }}
          path: |
            **/*.csv
          retention-days: 90

  # 可选：把结果提交回仓库（取消下面注释即可开启）
