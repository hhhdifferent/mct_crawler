name: 湖北省文旅厅政策爬虫

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 新增这一行

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        working-directory: hubeipolicy
        run: pip install -r requirements.txt

      - name: 运行爬虫
        working-directory: hubeipolicy
        run: python hubeipolicy.py

      - name: 上传 CSV（Artifact）
        uses: actions/upload-artifact@v4
        with:
          name: hubei-policy-${{ github.run_id }}
          path: hubeipolicy/*.csv
          retention-days: 90
