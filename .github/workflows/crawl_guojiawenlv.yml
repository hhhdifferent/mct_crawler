name: 国家文旅政策爬虫
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests lxml
      - run: python crawler.py guojiawenlv/config.json
      - uses: actions/upload-artifact@v4
        with:
          name: guojiawenlv-${{ github.run_id }}
          path: guojiawenlv/*.csv
          retention-days: 90
